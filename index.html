<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket FM - Annual Operating Plan Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --card-border: #2a2d3a;
    --accent: #6366f1;
    --accent2: #22d3ee;
    --accent3: #f59e0b;
    --accent4: #10b981;
    --red: #ef4444;
    --green: #10b981;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: linear-gradient(135deg, #1e1b4b, #312e81, #1e1b4b); padding: 18px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--card-border); }
  .header h1 { font-size: 22px; font-weight: 700; background: linear-gradient(90deg, #818cf8, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .subtitle { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
  .live-badge { display: flex; align-items: center; gap: 8px; background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); padding: 6px 14px; border-radius: 20px; font-size: 12px; color: var(--green); font-weight: 600; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .refresh-btn { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; margin-left: 12px; }
  .refresh-btn:hover { background: #4f46e5; }

  /* Navigation */
  .nav { display: flex; gap: 4px; padding: 12px 32px; background: var(--card); border-bottom: 1px solid var(--card-border); overflow-x: auto; }
  .nav button { background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; transition: all 0.2s; }
  .nav button:hover { background: rgba(99,102,241,0.1); color: var(--text); }
  .nav button.active { background: rgba(99,102,241,0.15); border-color: var(--accent); color: #a5b4fc; font-weight: 600; }

  /* Content */
  .content { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* KPI Cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; }
  .kpi-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi-card .value { font-size: 28px; font-weight: 700; }
  .kpi-card .change { font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .kpi-card .change.up { color: var(--green); }
  .kpi-card .change.down { color: var(--red); }
  .kpi-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* Tables */
  .table-container { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
  .table-container h3 { padding: 16px 20px; font-size: 15px; font-weight: 600; border-bottom: 1px solid var(--card-border); display: flex; align-items: center; gap: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: rgba(99,102,241,0.08); padding: 12px 16px; text-align: right; font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; }
  thead th:first-child { text-align: left; }
  tbody td { padding: 10px 16px; border-top: 1px solid rgba(255,255,255,0.04); text-align: right; }
  tbody td:first-child { text-align: left; font-weight: 500; }
  tbody tr:hover { background: rgba(99,102,241,0.05); }
  tbody tr.highlight { background: rgba(99,102,241,0.1); font-weight: 600; }
  tbody tr.sub-row td:first-child { padding-left: 32px; color: var(--text-muted); font-weight: 400; }
  .neg { color: var(--red); }
  .pos { color: var(--green); }
  .pct { color: var(--text-dim); font-size: 11px; }

  /* Charts */
  .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; margin-bottom: 24px; }
  .chart-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; }
  .chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 320px; }

  /* Geo tabs */
  .geo-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .geo-tabs button { background: var(--card); border: 1px solid var(--card-border); color: var(--text-muted); padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .geo-tabs button.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Scrollable table */
  .scroll-table { max-height: 600px; overflow-y: auto; }
  .scroll-table::-webkit-scrollbar { width: 6px; }
  .scroll-table::-webkit-scrollbar-track { background: var(--card); }
  .scroll-table::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--text-muted); }
  .loading .spinner { width: 40px; height: 40px; border: 3px solid var(--card-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .badge { background: rgba(99,102,241,0.15); color: #a5b4fc; font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; }

  /* Waterfall */
  .waterfall-bar { display: flex; align-items: end; gap: 2px; height: 200px; margin: 20px 0; }
  .waterfall-item { flex: 1; display: flex; flex-direction: column; align-items: center; }
  .waterfall-item .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.5s; min-height: 2px; }
  .waterfall-item .lbl { font-size: 10px; color: var(--text-muted); margin-top: 6px; text-align: center; }
  .waterfall-item .val { font-size: 11px; font-weight: 600; margin-bottom: 4px; }

  .tab-hint { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }
  .fy-toggle { display: flex; gap: 4px; margin-bottom: 16px; }
  .fy-toggle button { background: var(--card); border: 1px solid var(--card-border); color: var(--text-muted); padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .fy-toggle button.active { background: var(--accent); border-color: var(--accent); color: white; }
  .last-updated { font-size: 11px; color: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Pocket FM — Annual Operating Plan Dashboard</h1>
    <div class="subtitle">FY 2026-27 & FY 2027-28 | All Values in $ Mn</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="last-updated" id="lastUpdated"></span>
    <div class="live-badge"><span class="live-dot"></span> LIVE FROM SHEET</div>
    <button class="refresh-btn" onclick="loadAllData()">↻ Refresh</button>
  </div>
</div>

<div class="nav" id="mainNav">
  <button class="active" data-section="summary">📊 Overall Summary</button>
  <button data-section="geo-us">🇺🇸 US + ROW</button>
  <button data-section="geo-eu">🇪🇺 EU</button>
  <button data-section="geo-india">🇮🇳 India</button>
  <button data-section="geo-latam">🌎 LATAM</button>
  <button data-section="control">⚙️ Control Panel</button>
  <button data-section="cluster">🔀 Cluster View</button>
  <button data-section="unit-econ">💰 Unit Economics</button>
  <button data-section="deepdive">🔍 Line Item Deep Dive</button>
  <button data-section="cashflow">💵 Cash Flow</button>
</div>

<div class="content" id="mainContent">
  <div class="loading" id="loadingIndicator">
    <div class="spinner"></div>
    <div>Loading live data from Google Sheets...</div>
  </div>
</div>

<script>
const SHEET_ID = '1uyFwCEJswoKTmTfifDKHwLhjARfgUkIoJSQBT4dwzJI';
const GIDS = {
  overallSummary: 1141671534,
  controlPanel: 1758680295,
  cashFlow: 277552928
};

let DATA = {};

function parseCSV(csv) {
  const lines = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < csv.length; i++) {
    const ch = csv[i];
    if (ch === '"') { inQuotes = !inQuotes; current += ch; }
    else if (ch === '\n' && !inQuotes) { lines.push(current); current = ''; }
    else { current += ch; }
  }
  if (current) lines.push(current);

  return lines.map(line => {
    const cells = [];
    let cell = '';
    let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cells.push(cell.trim()); cell = ''; }
      else { cell += ch; }
    }
    cells.push(cell.trim());
    return cells;
  });
}

function parseNum(s) {
  if (!s) return 0;
  s = s.toString().trim().replace(/\s/g, '');
  const neg = s.startsWith('(') && s.endsWith(')');
  s = s.replace(/[(),%$]/g, '').replace(/,/g, '');
  const n = parseFloat(s);
  if (isNaN(n)) return 0;
  return neg ? -n : n;
}

function fmtNum(n, decimals = 1) {
  if (n === 0 || n === null || n === undefined) return '-';
  const abs = Math.abs(n);
  const formatted = abs.toFixed(decimals);
  if (n < 0) return `(${formatted})`;
  return formatted;
}

function fmtPct(s) {
  if (!s || s.trim() === '' || s.trim() === '-') return '-';
  return s.trim();
}

function colorVal(n) {
  if (n > 0) return 'pos';
  if (n < 0) return 'neg';
  return '';
}

async function fetchSheet(gid) {
  // Primary: Google Visualization API (CORS-friendly)
  const gvizUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
  try {
    const resp = await fetch(gvizUrl);
    if (resp.ok) {
      const text = await resp.text();
      return parseCSV(text);
    }
  } catch(e) { /* fall through */ }
  // Fallback: direct export
  const exportUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  try {
    const resp = await fetch(exportUrl);
    if (resp.ok) {
      const text = await resp.text();
      return parseCSV(text);
    }
  } catch(e) { /* fall through */ }
  // Fallback 2: CORS proxy
  const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`)}`;
  const resp = await fetch(proxyUrl);
  const text = await resp.text();
  return parseCSV(text);
}

async function loadAllData() {
  document.getElementById('loadingIndicator').style.display = 'block';
  try {
    const [overall, control, cashflow] = await Promise.all([
      fetchSheet(GIDS.overallSummary),
      fetchSheet(GIDS.controlPanel),
      fetchSheet(GIDS.cashFlow)
    ]);
    DATA.overall = overall;
    DATA.control = control;
    DATA.cashflow = cashflow;
    parseOverallSummary();
    document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    renderAll();
  } catch(e) {
    console.error('Error loading data:', e);
    document.getElementById('loadingIndicator').innerHTML = '<div style="color:#ef4444;">Error loading data. Check sheet permissions.</div>';
  }
}

function parseOverallSummary() {
  const rows = DATA.overall;
  const d = { overall: {}, geos: { 'US + ROW': {}, EU: {}, India: {}, LATAM: {} } };
  const fyColsOverall = { 'FY 23-24': 2, 'FY 24-25': 3, 'FY 25-26': 4, 'FY 26-27': 5, 'FY 27-28': 6 };
  const geoStartCols = { 'US + ROW': 8, EU: 13, India: 17, LATAM: 21 };
  // Each geo has FY 24-25, FY 25-26, FY 26-27, FY 27-28 (4 cols)

  const lineItems = [];
  for (let i = 3; i < rows.length; i++) {
    const label = (rows[i][1] || '').trim();
    if (!label) continue;
    const item = { label, row: i };
    // Overall values
    item.overall = {};
    for (const [fy, col] of Object.entries(fyColsOverall)) {
      item.overall[fy] = rows[i][col] || '';
    }
    // Geo values
    item.geos = {};
    for (const [geo, startCol] of Object.entries(geoStartCols)) {
      item.geos[geo] = {
        'FY 24-25': rows[i][startCol] || '',
        'FY 25-26': rows[i][startCol + 1] || '',
        'FY 26-27': rows[i][startCol + 2] || '',
        'FY 27-28': rows[i][startCol + 3] || ''
      };
    }
    lineItems.push(item);
  }
  DATA.lineItems = lineItems;
}

function getItem(label) {
  return DATA.lineItems?.find(i => i.label.includes(label));
}

function getItemVal(label, fy, source = 'overall') {
  const item = getItem(label);
  if (!item) return 0;
  if (source === 'overall') return parseNum(item.overall[fy]);
  return parseNum(item.geos[source]?.[fy]);
}

function renderAll() {
  document.getElementById('loadingIndicator').style.display = 'none';
  const content = document.getElementById('mainContent');

  // Remove old sections
  content.querySelectorAll('.section').forEach(s => s.remove());

  // Build all sections
  content.innerHTML += buildSummarySection();
  content.innerHTML += buildGeoSection('US + ROW', 'geo-us');
  content.innerHTML += buildGeoSection('EU', 'geo-eu');
  content.innerHTML += buildGeoSection('India', 'geo-india');
  content.innerHTML += buildGeoSection('LATAM', 'geo-latam');
  content.innerHTML += buildControlPanelSection();
  content.innerHTML += buildClusterSection();
  content.innerHTML += buildUnitEconSection();
  content.innerHTML += buildDeepDiveSection();
  content.innerHTML += buildCashFlowSection();

  // Show first section
  showSection('summary');
  initCharts();
}

function buildSummarySection() {
  const rev2627 = getItemVal('Gross Revenue', 'FY 26-27');
  const rev2728 = getItemVal('Gross Revenue', 'FY 27-28');
  const rev2526 = getItemVal('Gross Revenue', 'FY 25-26');
  const arr2728 = getItemVal('March Exit ARR', 'FY 27-28');
  const arr2627 = getItemVal('March Exit ARR', 'FY 26-27');
  const ebitda2627 = getItemVal('Adjusted EBITDA (for consolidated)', 'FY 26-27');
  const ebitda2728 = getItemVal('Adjusted EBITDA (for consolidated)', 'FY 27-28');
  const growth2627 = rev2627 > 0 && rev2526 > 0 ? ((rev2627/rev2526 - 1)*100).toFixed(1) : '-';
  const growth2728 = rev2728 > 0 && rev2627 > 0 ? ((rev2728/rev2627 - 1)*100).toFixed(1) : '-';

  const items = DATA.lineItems || [];

  let summaryRows = '';
  const highlightLabels = ['Gross Revenue', 'CM-1', 'CM-2', 'CM-3', 'Adjusted EBITDA'];
  for (const item of items) {
    const isHighlight = highlightLabels.some(h => item.label.startsWith(h));
    const isSubRow = item.label.startsWith('As a %') || item.label.startsWith('- ') || item.label.startsWith('CM-1%') || item.label.startsWith('CM-2%') || item.label.startsWith('CM-3%');
    const isPct = item.label.includes('%') || item.label.includes('Margin') || item.label.includes('Growth');
    const cls = isHighlight ? 'highlight' : (isSubRow ? 'sub-row' : '');

    const vals = ['FY 23-24','FY 24-25','FY 25-26','FY 26-27','FY 27-28'].map(fy => {
      const raw = item.overall[fy];
      if (isPct) return `<td class="pct">${fmtPct(raw)}</td>`;
      const n = parseNum(raw);
      return `<td class="${colorVal(n)}">${raw?.trim() || '-'}</td>`;
    }).join('');

    summaryRows += `<tr class="${cls}"><td>${item.label}</td>${vals}</tr>`;
  }

  return `
  <div class="section" id="sec-summary">
    <div class="section-title">Overall AOP Summary <span class="badge">FY 26-27 & FY 27-28</span></div>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="label">Gross Revenue FY 26-27</div>
        <div class="value" style="color:#6366f1;">$${fmtNum(rev2627)}M</div>
        <div class="change up">▲ ${growth2627}% YoY</div>
      </div>
      <div class="kpi-card">
        <div class="label">Gross Revenue FY 27-28</div>
        <div class="value" style="color:#22d3ee;">$${fmtNum(rev2728)}M</div>
        <div class="change up">▲ ${growth2728}% YoY</div>
      </div>
      <div class="kpi-card">
        <div class="label">Exit ARR FY 27-28</div>
        <div class="value" style="color:#f59e0b;">$${fmtNum(arr2728)}M</div>
        <div class="change up">▲ ${arr2627 > 0 ? ((arr2728/arr2627 - 1)*100).toFixed(1) : '-'}% YoY</div>
      </div>
      <div class="kpi-card">
        <div class="label">Adj. EBITDA FY 26-27</div>
        <div class="value" style="color:${ebitda2627 >= 0 ? '#10b981' : '#ef4444'};">$${fmtNum(ebitda2627)}M</div>
        <div class="sub">Margin: ${rev2627 > 0 ? (ebitda2627/rev2627*100).toFixed(1) : '-'}%</div>
      </div>
      <div class="kpi-card">
        <div class="label">Adj. EBITDA FY 27-28</div>
        <div class="value" style="color:${ebitda2728 >= 0 ? '#10b981' : '#ef4444'};">$${fmtNum(ebitda2728)}M</div>
        <div class="sub">Margin: ${rev2728 > 0 ? (ebitda2728/rev2728*100).toFixed(1) : '-'}%</div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><h3>Revenue Trajectory</h3><div class="chart-wrap"><canvas id="chartRevenue"></canvas></div></div>
      <div class="chart-card"><h3>EBITDA Bridge</h3><div class="chart-wrap"><canvas id="chartEbitda"></canvas></div></div>
    </div>
    <div class="table-container">
      <h3>📋 P&L Summary — All Years</h3>
      <div class="scroll-table">
        <table>
          <thead><tr><th>Line Item</th><th>FY 23-24</th><th>FY 24-25</th><th>FY 25-26</th><th>FY 26-27</th><th>FY 27-28</th></tr></thead>
          <tbody>${summaryRows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function buildGeoSection(geoName, sectionId) {
  const items = DATA.lineItems || [];
  const highlightLabels = ['Gross Revenue', 'CM-1', 'CM-2', 'CM-3'];
  const flag = {'US + ROW':'🇺🇸','EU':'🇪🇺','India':'🇮🇳','LATAM':'🌎'}[geoName];

  let rows = '';
  for (const item of items) {
    const isHighlight = highlightLabels.some(h => item.label.startsWith(h));
    const isSubRow = item.label.startsWith('As a %') || item.label.startsWith('- ');
    const isPct = item.label.includes('%') || item.label.includes('Margin') || item.label.includes('Growth');
    const cls = isHighlight ? 'highlight' : (isSubRow ? 'sub-row' : '');

    const geoData = item.geos[geoName];
    if (!geoData) continue;

    const vals = ['FY 24-25','FY 25-26','FY 26-27','FY 27-28'].map(fy => {
      const raw = geoData[fy];
      if (isPct) return `<td class="pct">${fmtPct(raw)}</td>`;
      const n = parseNum(raw);
      return `<td class="${colorVal(n)}">${raw?.trim() || '-'}</td>`;
    }).join('');

    rows += `<tr class="${cls}"><td>${item.label}</td>${vals}</tr>`;
  }

  const rev26 = getItemVal('Gross Revenue', 'FY 26-27', geoName);
  const rev27 = getItemVal('Gross Revenue', 'FY 27-28', geoName);
  const rev25 = getItemVal('Gross Revenue', 'FY 25-26', geoName);
  const cm1_26 = getItemVal('CM-1', 'FY 26-27', geoName);
  const cm1_27 = getItemVal('CM-1', 'FY 27-28', geoName);

  return `
  <div class="section" id="sec-${sectionId}">
    <div class="section-title">${flag} ${geoName} — Geography P&L</div>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="label">Revenue FY 26-27</div>
        <div class="value" style="color:#6366f1;">$${fmtNum(rev26)}M</div>
        <div class="change up">▲ ${rev25 > 0 ? ((rev26/rev25-1)*100).toFixed(1) : '-'}% YoY</div>
      </div>
      <div class="kpi-card">
        <div class="label">Revenue FY 27-28</div>
        <div class="value" style="color:#22d3ee;">$${fmtNum(rev27)}M</div>
        <div class="change up">▲ ${rev26 > 0 ? ((rev27/rev26-1)*100).toFixed(1) : '-'}% YoY</div>
      </div>
      <div class="kpi-card">
        <div class="label">CM-1 FY 26-27</div>
        <div class="value" style="color:#f59e0b;">$${fmtNum(cm1_26)}M</div>
        <div class="sub">CM-1%: ${rev26 > 0 ? (cm1_26/rev26*100).toFixed(1) : '-'}%</div>
      </div>
      <div class="kpi-card">
        <div class="label">CM-1 FY 27-28</div>
        <div class="value" style="color:#10b981;">$${fmtNum(cm1_27)}M</div>
        <div class="sub">CM-1%: ${rev27 > 0 ? (cm1_27/rev27*100).toFixed(1) : '-'}%</div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><h3>Revenue & CM-1 Trend — ${geoName}</h3><div class="chart-wrap"><canvas id="chartGeo_${sectionId}"></canvas></div></div>
    </div>
    <div class="table-container">
      <h3>📋 ${geoName} Detailed P&L</h3>
      <div class="scroll-table">
        <table>
          <thead><tr><th>Line Item</th><th>FY 24-25</th><th>FY 25-26</th><th>FY 26-27</th><th>FY 27-28</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function buildControlPanelSection() {
  const rows = DATA.control || [];
  // Parse sections: Marketing Spends, Production Spends, Promotional Expenses, CPI, M0 Recovery, Revenue Share, Platform Commission, Ads Revenue, Content Dev, Brand, Employee
  const sections = [
    { name: 'Marketing Spends', startKey: 'Marketing Spends' },
    { name: 'Production Spends (as % of mkt)', startKey: 'Production Spends' },
    { name: 'Promotional Expenses Spends', startKey: 'Promotional Expenses' },
    { name: 'CPI (First Time Installs)', startKey: 'CPI' },
    { name: 'M0 Recovery', startKey: 'M0 Recovery' },
    { name: 'Revenue Share', startKey: 'Revenue Share' },
    { name: 'Platform Commission', startKey: 'Platform Commission' },
    { name: 'Ads Revenue', startKey: 'Ads Revenue' },
    { name: 'Content Development Cost', startKey: 'Content Development' },
    { name: 'Brand Expenses', startKey: 'Brand Expense' },
    { name: 'Employee Cost', startKey: 'Employee Cost' }
  ];

  let html = '';
  for (const sec of sections) {
    let startIdx = -1;
    for (let i = 0; i < rows.length; i++) {
      if ((rows[i][1] || '').includes(sec.startKey)) { startIdx = i; break; }
    }
    if (startIdx < 0) continue;

    const months = rows[startIdx].slice(2, 14).map(m => m?.trim() || '');
    const geoRows = [];
    for (let i = startIdx + 1; i < Math.min(startIdx + 9, rows.length); i++) {
      const geo = (rows[i][1] || '').trim();
      if (!geo || geo === '') break;
      const vals = rows[i].slice(2, 14);
      geoRows.push({ geo, vals });
    }

    let tableRows = '';
    for (const gr of geoRows) {
      const cells = gr.vals.map(v => `<td>${v || '-'}</td>`).join('');
      tableRows += `<tr><td>${gr.geo}</td>${cells}</tr>`;
    }

    const headerCells = months.slice(0, 12).map(m => `<th>${m?.substring(0, 8) || ''}</th>`).join('');
    html += `
    <div class="table-container">
      <h3>⚙️ ${sec.name}</h3>
      <div class="scroll-table" style="overflow-x:auto;">
        <table>
          <thead><tr><th>Geography</th>${headerCells}</tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>`;
  }

  return `
  <div class="section" id="sec-control">
    <div class="section-title">⚙️ Control Panel — AOP Assumptions <span class="badge">FY 26-27 & FY 27-28</span></div>
    <p class="tab-hint">Key assumptions used to build the Annual Operating Plan. Monthly geo-level inputs.</p>
    ${html}
  </div>`;
}

function buildClusterSection() {
  const geos = ['US + ROW', 'EU', 'India', 'LATAM'];
  const metrics = [
    { label: 'Gross Revenue', key: 'Gross Revenue' },
    { label: 'Gross In-App Revenue', key: 'Gross In-App Revenue' },
    { label: 'Gross Ad Revenue', key: 'Gross Ad Revenue' },
    { label: 'CM-1', key: 'CM-1' },
    { label: 'CM-2', key: 'CM-2' },
    { label: 'CM-3', key: 'CM-3' },
    { label: 'Marketing Expense', key: 'Marketing Expense' },
    { label: 'Content Development Cost', key: 'Content Development Cost' },
    { label: 'Taxes & Platform Commission', key: 'Taxes & Platform Commission' },
    { label: 'Revenue Share', key: 'Revenue Share' },
    { label: 'Production Expenses', key: 'Production Expenses' },
    { label: 'Ad Cost', key: 'Ad Cost' },
    { label: 'Operational Employees Salaries', key: 'Operational Employees Salaries' }
  ];

  const fys = ['FY 26-27', 'FY 27-28'];
  let tables = '';

  for (const fy of fys) {
    const totalRev = getItemVal('Gross Revenue', fy);
    let rows = '';
    for (const m of metrics) {
      const isHighlight = ['Gross Revenue', 'CM-1', 'CM-2', 'CM-3'].includes(m.key);
      let cells = '';
      for (const geo of geos) {
        const val = getItemVal(m.key, fy, geo);
        const pctOfTotal = totalRev > 0 ? (val / totalRev * 100).toFixed(1) : '-';
        cells += `<td class="${colorVal(val)}">${fmtNum(val)} <span class="pct">(${pctOfTotal}%)</span></td>`;
      }
      const overallVal = getItemVal(m.key, fy);
      rows += `<tr class="${isHighlight ? 'highlight' : ''}"><td>${m.label}</td><td class="${colorVal(overallVal)}">${fmtNum(overallVal)}</td>${cells}</tr>`;
    }

    tables += `
    <div class="table-container">
      <h3>🔀 Cluster Comparison — ${fy}</h3>
      <div class="scroll-table" style="overflow-x:auto;">
        <table>
          <thead><tr><th>Line Item</th><th>Overall</th><th>US + ROW</th><th>EU</th><th>India</th><th>LATAM</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }

  return `
  <div class="section" id="sec-cluster">
    <div class="section-title">🔀 Cluster View — Geography Contribution Analysis</div>
    <p class="tab-hint">Every line item compared across all geographies with % contribution to overall.</p>
    <div class="chart-grid">
      <div class="chart-card"><h3>Revenue Mix by Geography — FY 26-27</h3><div class="chart-wrap"><canvas id="chartCluster2627"></canvas></div></div>
      <div class="chart-card"><h3>Revenue Mix by Geography — FY 27-28</h3><div class="chart-wrap"><canvas id="chartCluster2728"></canvas></div></div>
    </div>
    ${tables}
  </div>`;
}

function buildDeepDiveSection() {
  const lineItemsForDive = [
    'Gross In-App Revenue', 'Gross Ad Revenue', 'Taxes & Platform Commission',
    'Revenue Share', 'Content Development Cost', 'Ad Cost',
    'Marketing Expense', 'Production Expenses', 'Brand Expenses',
    'Operational Employees Salaries'
  ];
  const geos = ['US + ROW', 'EU', 'India', 'LATAM'];
  const fys = ['FY 25-26', 'FY 26-27', 'FY 27-28'];

  let cards = '';
  for (const li of lineItemsForDive) {
    let rows = '';
    // Overall row
    let overallCells = fys.map(fy => {
      const v = getItemVal(li, fy);
      return `<td class="${colorVal(v)}">${fmtNum(v)}</td>`;
    }).join('');
    // YoY changes
    const v26 = getItemVal(li, 'FY 26-27');
    const v25 = getItemVal(li, 'FY 25-26');
    const v27 = getItemVal(li, 'FY 27-28');
    const chg1 = v25 !== 0 ? ((v26/v25-1)*100).toFixed(1)+'%' : '-';
    const chg2 = v26 !== 0 ? ((v27/v26-1)*100).toFixed(1)+'%' : '-';
    overallCells += `<td class="pct">${chg1}</td><td class="pct">${chg2}</td>`;
    rows += `<tr class="highlight"><td>Overall</td>${overallCells}</tr>`;

    for (const geo of geos) {
      let geoCells = fys.map(fy => {
        const v = getItemVal(li, fy, geo);
        return `<td class="${colorVal(v)}">${fmtNum(v)}</td>`;
      }).join('');
      const gv26 = getItemVal(li, 'FY 26-27', geo);
      const gv25 = getItemVal(li, 'FY 25-26', geo);
      const gv27 = getItemVal(li, 'FY 27-28', geo);
      const gc1 = gv25 !== 0 ? ((gv26/gv25-1)*100).toFixed(1)+'%' : '-';
      const gc2 = gv26 !== 0 ? ((gv27/gv26-1)*100).toFixed(1)+'%' : '-';
      geoCells += `<td class="pct">${gc1}</td><td class="pct">${gc2}</td>`;
      rows += `<tr><td>${geo}</td>${geoCells}</tr>`;
    }

    // % of Revenue row
    let pctRow = '<tr class="sub-row"><td>% of Gross Revenue</td>';
    for (const fy of fys) {
      const v = getItemVal(li, fy);
      const rev = getItemVal('Gross Revenue', fy);
      pctRow += `<td class="pct">${rev > 0 ? (v/rev*100).toFixed(1)+'%' : '-'}</td>`;
    }
    pctRow += '<td></td><td></td></tr>';
    rows += pctRow;

    cards += `
    <div class="table-container">
      <h3>🔍 ${li}</h3>
      <table>
        <thead><tr><th>Geography</th><th>FY 25-26</th><th>FY 26-27</th><th>FY 27-28</th><th>YoY 26/25</th><th>YoY 27/26</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  return `
  <div class="section" id="sec-deepdive">
    <div class="section-title">🔍 Line Item Deep Dive — Investment Insights</div>
    <p class="tab-hint">Geo-wise breakdown with YoY growth for every major line item.</p>
    ${cards}
  </div>`;
}

function buildCashFlowSection() {
  const cfRows = DATA.cashflow || [];
  // Parse months from row 3 (index 2)
  const months = cfRows[2]?.slice(2, 34).map(m => m?.trim() || '') || [];

  // Find key rows
  function findRow(keyword) {
    for (let i = 0; i < cfRows.length; i++) {
      const cell = (cfRows[i][1] || '').trim() + (cfRows[i][2] || '').trim();
      if (cell.includes(keyword)) return i;
    }
    return -1;
  }

  // Get key cashflow lines
  const keyLines = [
    { label: 'IAP Income USA', row: findRow('IAP income USA') },
    { label: 'Ad Revenue USA', row: findRow('Ad. Revenue USA') },
    { label: 'Net Revenue USA', row: findRow('Net Revenue') },
    { label: 'Net Cash Flow - Operating', row: findRow('Net Cash Flow from Operating') },
    { label: 'Net Cash Flow - Investing', row: findRow('Net Cash flow from Investing') },
    { label: 'Closing Cash Balance', row: findRow('Closing Cash Balance') },
  ];

  // Also find all the geo operating cashflow lines
  const geoLines = [];
  for (let i = 0; i < cfRows.length; i++) {
    const c1 = (cfRows[i][1] || '').trim();
    const c2 = (cfRows[i][2] || '').trim();
    if (c1.includes('Operational Cashflow from') || c2.includes('Operational Cashflow from')) {
      geoLines.push({ label: c1 || c2, row: i });
    }
  }

  // Build quarterly summary
  const qLabels = ['Q1 FY27', 'Q2 FY27', 'Q3 FY27', 'Q4 FY27', 'Q1 FY28', 'Q2 FY28', 'Q3 FY28', 'Q4 FY28'];

  function getQuarterlyVals(rowIdx) {
    if (rowIdx < 0) return qLabels.map(() => 0);
    const vals = cfRows[rowIdx]?.slice(2, 34).map(v => parseNum(v)) || [];
    // Months start from Sep 2025, so FY 26-27 Q1 = Jul-Sep 2025 (cols 0-2 roughly)
    // Actually months: Sep25, Oct25, Nov25, Dec25, Jan26, Feb26, Mar26, Apr26, May26, Jun26, Jul26, Aug26, Sep26...
    // FY26-27: Apr 2026 - Mar 2027 = indices 7..18
    // Q1: Apr-Jun (7,8,9), Q2: Jul-Sep (10,11,12), Q3: Oct-Dec (13,14,15), Q4: Jan-Mar (16,17,18)
    const quarters = [];
    for (let q = 0; q < 8; q++) {
      const start = 7 + q * 3;
      let sum = 0;
      for (let j = start; j < start + 3 && j < vals.length; j++) {
        sum += (vals[j] || 0);
      }
      quarters.push(sum);
    }
    return quarters;
  }

  // Build monthly table for key items
  const displayMonths = months.slice(7, 31); // Apr 2026 onwards
  let monthHeaders = displayMonths.map(m => `<th>${(m || '').substring(0, 8)}</th>`).join('');

  let cfTableRows = '';
  const allCfLines = [
    { label: 'Net Cash Flow - Operating', row: findRow('Net Cash Flow from Operating') },
    { label: 'Net Cash Flow - Investing', row: findRow('Net Cash flow from Investing') },
    { label: 'Closing Cash Balance', row: findRow('Closing Cash Balance') },
  ];
  for (const line of allCfLines) {
    if (line.row < 0) continue;
    const vals = cfRows[line.row]?.slice(9, 33).map(v => {
      const n = parseNum(v);
      return `<td class="${colorVal(n)}">${n !== 0 ? (n/1000000).toFixed(2) + 'M' : '-'}</td>`;
    }).join('') || '';
    cfTableRows += `<tr class="highlight"><td>${line.label}</td>${vals}</tr>`;
  }

  // Geo cashflow rows
  for (const line of geoLines) {
    const vals = cfRows[line.row]?.slice(9, 33).map(v => {
      const n = parseNum(v);
      return `<td class="${colorVal(n)}">${n !== 0 ? (n/1000000).toFixed(2) + 'M' : '-'}</td>`;
    }).join('') || '';
    cfTableRows += `<tr><td>${line.label}</td>${vals}</tr>`;
  }

  return `
  <div class="section" id="sec-cashflow">
    <div class="section-title">💵 Cash Flow Analysis <span class="badge">Monthly View</span></div>
    <p class="tab-hint">All values shown in USD. Monthly cash flow from operating & investing activities.</p>
    <div class="chart-grid">
      <div class="chart-card"><h3>Quarterly Net Operating Cash Flow</h3><div class="chart-wrap"><canvas id="chartCF"></canvas></div></div>
      <div class="chart-card"><h3>Closing Cash Balance Trend</h3><div class="chart-wrap"><canvas id="chartCFBalance"></canvas></div></div>
    </div>
    <div class="table-container">
      <h3>📋 Cash Flow Details (in $M)</h3>
      <div class="scroll-table" style="overflow-x:auto;">
        <table>
          <thead><tr><th>Item</th>${monthHeaders}</tr></thead>
          <tbody>${cfTableRows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  const sec = document.getElementById('sec-' + id);
  if (sec) sec.classList.add('active');
  const btn = document.querySelector(`.nav button[data-section="${id}"]`);
  if (btn) btn.classList.add('active');
}

// Nav handling
document.getElementById('mainNav').addEventListener('click', e => {
  if (e.target.tagName === 'BUTTON') {
    showSection(e.target.dataset.section);
  }
});

function initCharts() {
  const chartOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
      y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.06)' } }
    }
  };

  // Revenue Trajectory
  const fys = ['FY 23-24','FY 24-25','FY 25-26','FY 26-27','FY 27-28'];
  const revData = fys.map(fy => getItemVal('Gross Revenue', fy));
  const iapData = fys.map(fy => getItemVal('Gross In-App Revenue', fy));
  const adData = fys.map(fy => getItemVal('Gross Ad Revenue', fy));

  new Chart(document.getElementById('chartRevenue'), {
    type: 'bar',
    data: {
      labels: fys,
      datasets: [
        { label: 'In-App Revenue', data: iapData, backgroundColor: '#6366f1', borderRadius: 4 },
        { label: 'Ad Revenue', data: adData, backgroundColor: '#22d3ee', borderRadius: 4 }
      ]
    },
    options: { ...chartOpts, scales: { ...chartOpts.scales, x: { ...chartOpts.scales.x, stacked: true }, y: { ...chartOpts.scales.y, stacked: true } } }
  });

  // EBITDA Bridge
  const ebitdaData = fys.map(fy => getItemVal('Adjusted EBITDA (for consolidated)', fy));
  new Chart(document.getElementById('chartEbitda'), {
    type: 'line',
    data: {
      labels: fys,
      datasets: [{
        label: 'Adj. EBITDA ($M)',
        data: ebitdaData,
        borderColor: '#10b981',
        backgroundColor: 'rgba(16,185,129,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 6,
        pointBackgroundColor: ebitdaData.map(v => v >= 0 ? '#10b981' : '#ef4444')
      }]
    },
    options: chartOpts
  });

  // Geo charts
  const geoChartConfigs = [
    { id: 'chartGeo_geo-us', geo: 'US + ROW' },
    { id: 'chartGeo_geo-eu', geo: 'EU' },
    { id: 'chartGeo_geo-india', geo: 'India' },
    { id: 'chartGeo_geo-latam', geo: 'LATAM' }
  ];
  const geoFys = ['FY 24-25','FY 25-26','FY 26-27','FY 27-28'];
  for (const gc of geoChartConfigs) {
    const el = document.getElementById(gc.id);
    if (!el) continue;
    new Chart(el, {
      type: 'bar',
      data: {
        labels: geoFys,
        datasets: [
          { label: 'Revenue', data: geoFys.map(fy => getItemVal('Gross Revenue', fy, gc.geo)), backgroundColor: '#6366f1', borderRadius: 4 },
          { label: 'CM-1', data: geoFys.map(fy => getItemVal('CM-1', fy, gc.geo)), backgroundColor: '#22d3ee', borderRadius: 4 },
          { label: 'CM-2', data: geoFys.map(fy => getItemVal('CM-2', fy, gc.geo)), backgroundColor: '#f59e0b', borderRadius: 4 }
        ]
      },
      options: chartOpts
    });
  }

  // Cluster donut charts
  const geos = ['US + ROW', 'EU', 'India', 'LATAM'];
  const geoColors = ['#6366f1', '#22d3ee', '#f59e0b', '#10b981'];
  for (const [fy, id] of [['FY 26-27', 'chartCluster2627'], ['FY 27-28', 'chartCluster2728']]) {
    const el = document.getElementById(id);
    if (!el) continue;
    new Chart(el, {
      type: 'doughnut',
      data: {
        labels: geos,
        datasets: [{
          data: geos.map(g => getItemVal('Gross Revenue', fy, g)),
          backgroundColor: geoColors,
          borderWidth: 0
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 12 }, padding: 16 } }
        }
      }
    });
  }

  // Unit Economics Waterfall charts
  for (const [fy, id] of [['FY 26-27', 'chartUE2627'], ['FY 27-28', 'chartUE2728']]) {
    const el = document.getElementById(id);
    if (!el) continue;
    const rev = getItemVal('Gross Revenue', fy);
    const tax = Math.abs(getItemVal('Taxes & Platform Commission', fy));
    const revShare = Math.abs(getItemVal('Revenue Share', fy));
    const content = Math.abs(getItemVal('Content Development Cost', fy));
    const adCost = Math.abs(getItemVal('Ad Cost', fy));
    const cm1 = getItemVal('CM-1', fy);
    const mktg = Math.abs(getItemVal('Marketing Expense', fy));
    const prod = Math.abs(getItemVal('Production Expenses', fy));
    const brand = Math.abs(getItemVal('Brand Expenses', fy));
    const cm2 = getItemVal('CM-2', fy);
    const opsEmp = Math.abs(getItemVal('Operational Employees Salaries', fy));
    const cm3 = getItemVal('CM-3', fy);

    new Chart(el, {
      type: 'bar',
      data: {
        labels: ['Revenue', 'Tax/Platform', 'Rev Share', 'Content', 'Ad Cost', 'CM-1', 'Marketing', 'Production', 'Brand', 'CM-2', 'Ops Salary', 'CM-3'],
        datasets: [{
          data: [rev, -tax, -revShare, -content, -adCost, cm1, -mktg, -prod, -brand, cm2, -opsEmp, cm3],
          backgroundColor: [
            '#6366f1', '#ef4444', '#ef4444', '#ef4444', '#ef4444', '#22d3ee',
            '#ef4444', '#ef4444', '#ef4444', '#f59e0b',
            '#ef4444', '#10b981'
          ],
          borderRadius: 4
        }]
      },
      options: {
        ...chartOpts,
        plugins: { ...chartOpts.plugins, legend: { display: false } },
        scales: {
          x: { ticks: { color: '#64748b', font: { size: 9 }, maxRotation: 45 }, grid: { display: false } },
          y: { ...chartOpts.scales.y }
        }
      }
    });
  }

  // Cash Flow charts
  const cfRows = DATA.cashflow || [];
  function findCFRow(keyword) {
    for (let i = 0; i < cfRows.length; i++) {
      const cell = (cfRows[i][1] || '') + (cfRows[i][2] || '');
      if (cell.includes(keyword)) return i;
    }
    return -1;
  }

  // Quarterly Operating Cash Flow
  const opCfRow = findCFRow('Net Cash Flow from Operating');
  const closingRow = findCFRow('Closing Cash Balance');
  const qLabels = ['Q1 FY27', 'Q2 FY27', 'Q3 FY27', 'Q4 FY27', 'Q1 FY28', 'Q2 FY28', 'Q3 FY28', 'Q4 FY28'];

  function getQuarterly(rowIdx) {
    if (rowIdx < 0) return qLabels.map(() => 0);
    const vals = cfRows[rowIdx]?.slice(2, 34).map(v => parseNum(v)) || [];
    const quarters = [];
    for (let q = 0; q < 8; q++) {
      const start = 7 + q * 3;
      let sum = 0;
      for (let j = start; j < start + 3 && j < vals.length; j++) sum += (vals[j] || 0);
      quarters.push(sum / 1000000); // Convert to $M
    }
    return quarters;
  }

  const cfEl = document.getElementById('chartCF');
  if (cfEl) {
    new Chart(cfEl, {
      type: 'bar',
      data: {
        labels: qLabels,
        datasets: [{
          label: 'Net Operating CF ($M)',
          data: getQuarterly(opCfRow),
          backgroundColor: getQuarterly(opCfRow).map(v => v >= 0 ? '#10b981' : '#ef4444'),
          borderRadius: 4
        }]
      },
      options: { ...chartOpts, plugins: { ...chartOpts.plugins, legend: { display: false } } }
    });
  }

  // Closing Cash Balance trend
  const balEl = document.getElementById('chartCFBalance');
  if (balEl && closingRow >= 0) {
    const months = cfRows[2]?.slice(9, 33).map(m => (m || '').trim().substring(0, 8)) || [];
    const balVals = cfRows[closingRow]?.slice(9, 33).map(v => parseNum(v) / 1000000) || [];
    new Chart(balEl, {
      type: 'line',
      data: {
        labels: months,
        datasets: [{
          label: 'Closing Cash ($M)',
          data: balVals,
          borderColor: '#6366f1',
          backgroundColor: 'rgba(99,102,241,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 3
        }]
      },
      options: chartOpts
    });
  }
}

// Auto-refresh every 5 minutes
setInterval(loadAllData, 300000);

// Initial load
loadAllData();
</script>
</body>
</html>
